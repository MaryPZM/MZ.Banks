
<div style="padding: 1rem 0; overflow-x: auto; background: #ffffff;">
<div id="gantt-wrap" style="min-width: 760px; background: #ffffff;"></div>
</div>
<script>
const textPrimary   = '#1A1A18';
const textSecondary = '#444441';
const gridLine      = 'rgba(0,0,0,0.10)';
const headerBg      = 'rgba(0,0,0,0.05)';
const nowFill       = '#D85A30';
const rowAlt        = 'rgba(0,0,0,0.03)';

// 7 columnas con anchos relativos:
// S1-2, S3-4, S5-6, S7-8, S9-10, S11-12, S13-15, S16
// S13-15 = 3 semanas => peso 3, S16 = 1 semana => peso 1, resto 2 semanas => peso 2
const colLabels  = ['S1–2','S3–4','S5–6','S7–8','S9–10','S11–12','S13–15','S16'];
const colWeights = [2, 2, 2, 2, 2, 2, 3, 1]; // semanas por columna
const totalWeight = colWeights.reduce((a,b) => a+b, 0); // 16

const entregaColW = 80;
const labelW  = 220;
const totalW  = 980;
const chartW  = totalW - labelW - entregaColW;
const rowH    = 36;
const headerH = 40;
const barPad  = 6;

// Compute x positions and widths for each column
const colX = [];
const colW = [];
let accW = 0;
colWeights.forEach(w => {
  colX.push(accW);
  colW.push(chartW * w / totalWeight);
  accW += chartW * w / totalWeight;
});

const tasks = [
  // start/end = column indices (0-based)
  { label: '1. Entregables',                       startCol: 1, endCol: 6, color: '#534AB7' },
  { label: '2. Vínculos académicos y descripción',  startCol: 1, endCol: 1, color: '#1D9E75' },
  { label: '3. Nombre del proyecto y detalles',     startCol: 1, endCol: 2, color: '#1D9E75' },
  { label: '4. Licencia del software',              startCol: 2, endCol: 2, color: '#378ADD' },
  { label: '5. Reporte de visión',                  startCol: 2, endCol: 3, color: '#378ADD' },
  { label: '6. Especificación de requisitos',       startCol: 3, endCol: 4, color: '#BA7517' },
  { label: '7. Plan de proyecto',                   startCol: 3, endCol: 4, color: '#BA7517' },
  { label: '8. Plan de versionado',                 startCol: 4, endCol: 5, color: '#D4537E' },
  { label: '9. Algoritmo',                          startCol: 4, endCol: 5, color: '#D4537E' },
  { label: '10. Manual de usuario',                 startCol: 5, endCol: 6, color: '#3B6D11' },
  { label: '11. GitHub',                            startCol: 1, endCol: 6, color: '#5F5E5A' },
  { label: '12. Sustentaciones',                    startCol: 7, endCol: 7, color: '#993556' },
];

const svgH = headerH + tasks.length * rowH + 16;

// Current week: S6-7 => in col index 2 (S5-6) midpoint
const nowX = labelW + entregaColW + colX[2] + colW[2] * 0.5;

let svg = `<svg viewBox="0 0 ${totalW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,Helvetica,sans-serif; background:#ffffff;">`;
svg += `<rect x="0" y="0" width="${totalW}" height="${svgH}" fill="#ffffff"/>`;

// Header backgrounds
svg += `<rect x="0" y="0" width="${labelW + entregaColW}" height="${headerH}" fill="${headerBg}"/>`;
svg += `<rect x="${labelW + entregaColW}" y="0" width="${chartW}" height="${headerH}" fill="${headerBg}"/>`;

// Vertical grid lines (chart)
colX.forEach((x, i) => {
  const px = labelW + entregaColW + x;
  svg += `<line x1="${px}" y1="0" x2="${px}" y2="${svgH}" stroke="${gridLine}" stroke-width="1"/>`;
});
// Final right border
svg += `<line x1="${labelW + entregaColW + chartW}" y1="0" x2="${labelW + entregaColW + chartW}" y2="${svgH}" stroke="${gridLine}" stroke-width="1"/>`;

// Column separators
svg += `<line x1="${labelW + entregaColW}" y1="0" x2="${labelW + entregaColW}" y2="${svgH}" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>`;
svg += `<line x1="${labelW}" y1="0" x2="${labelW}" y2="${svgH}" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>`;

// Header separator
svg += `<line x1="0" y1="${headerH}" x2="${totalW}" y2="${headerH}" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>`;

// Header labels
svg += `<text x="${labelW / 2}" y="${headerH/2+5}" text-anchor="middle" font-size="12" font-weight="bold" fill="${textSecondary}">Actividad</text>`;
svg += `<text x="${labelW + entregaColW/2}" y="${headerH/2+5}" text-anchor="middle" font-size="11" font-weight="bold" fill="${textSecondary}">Entrega</text>`;
colLabels.forEach((lbl, i) => {
  const cx = labelW + entregaColW + colX[i] + colW[i] / 2;
  svg += `<text x="${cx}" y="${headerH/2+5}" text-anchor="middle" font-size="11" font-weight="bold" fill="${textSecondary}">${lbl}</text>`;
});

// Row backgrounds
tasks.forEach((t, i) => {
  const y = headerH + i * rowH;
  svg += `<rect x="0" y="${y}" width="${totalW}" height="${rowH}" fill="${i%2!==0 ? rowAlt : 'transparent'}"/>`;
});

// Group brackets
const groups = [
  { rows: [0,6],  label: 'Entrega 1', sub: 'Sem. 1–8',  fill: '#EEEDFE', stroke: '#534AB7', text: '#3C3489' },
  { rows: [7,11], label: 'Entrega 2', sub: 'Sem. 8–16', fill: '#E1F5EE', stroke: '#1D9E75', text: '#085041' },
];
groups.forEach(g => {
  const y1 = headerH + g.rows[0] * rowH;
  const y2 = headerH + (g.rows[1]+1) * rowH;
  const cx = labelW + entregaColW / 2;
  const h  = y2 - y1;
  svg += `<rect x="${labelW+4}" y="${y1+4}" width="${entregaColW-8}" height="${h-8}" rx="5" fill="${g.fill}" stroke="${g.stroke}" stroke-width="1.2"/>`;
  svg += `<text x="${cx}" y="${y1+h/2-5}" text-anchor="middle" font-size="11" font-weight="bold" fill="${g.text}">${g.label}</text>`;
  svg += `<text x="${cx}" y="${y1+h/2+9}" text-anchor="middle" font-size="10" fill="${g.text}">${g.sub}</text>`;
});

// Activity labels + bars
tasks.forEach((t, i) => {
  const y = headerH + i * rowH;
  svg += `<text x="${labelW-8}" y="${y+rowH/2+5}" text-anchor="end" font-size="12" font-weight="500" fill="${textPrimary}">${t.label}</text>`;
  const bx = labelW + entregaColW + colX[t.startCol] + 3;
  const bw = (colX[t.endCol] + colW[t.endCol]) - colX[t.startCol] - 6;
  const by = y + barPad;
  const bh = rowH - barPad * 2;
  svg += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="4" fill="${t.color}"/>`;
});

// Bottom border
svg += `<line x1="0" y1="${svgH-1}" x2="${totalW}" y2="${svgH-1}" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>`;

// Current week line
svg += `<line x1="${nowX}" y1="0" x2="${nowX}" y2="${svgH}" stroke="${nowFill}" stroke-width="2" stroke-dasharray="5 3"/>`;
svg += `<rect x="${nowX-18}" y="2" width="36" height="18" rx="3" fill="${nowFill}"/>`;
svg += `<text x="${nowX}" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">S6–7</text>`;

svg += `</svg>`;

document.getElementById('gantt-wrap').innerHTML = svg;
</script>
